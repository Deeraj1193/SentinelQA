<!DOCTYPE html>
<html>

<head>

<title>SentinelQA Dashboard</title>

<link rel="stylesheet" href="/static/style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<h1>SentinelQA Dashboard</h1>

<div class="cards">

<div class="card">
<h2>Total Tests</h2>
<p id="totalTests">0</p>
</div>

<div class="card">
<h2>Failures</h2>
<p id="failures">0</p>
</div>

<div class="card">
<h2>Screenshots</h2>
<p id="screenshots">0</p>
</div>

<div class="card">
<h2>Browsers</h2>
<p id="browsers">0</p>
</div>

</div>


<div class="chart-container">

<div class="chart-box">
<h3>Pass vs Fail</h3>
<canvas id="passFailChart"></canvas>
</div>

<div class="chart-box">
<h3>Browser Distribution</h3>
<canvas id="browserChart"></canvas>
</div>

</div>

<h2 style="margin-top:60px;">Failure Screenshots</h2>

<div id="screenshotList" class="cards"></div>

<script src="/static/dashboard.js"></script>

</body>
</html>
